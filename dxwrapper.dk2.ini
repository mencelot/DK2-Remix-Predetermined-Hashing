;; ============================================================================
;; dxwrapper.ini  —  Dungeon Keeper 2 + RTX Remix configuration
;; ============================================================================
;; Drop this (renamed to dxwrapper.ini) and dxwrapper.dll into the DK2 game
;; folder, alongside an RTX Remix runtime. Values below are the working config;
;; every DK2-specific setting is explained inline.
;;
;; Upstream dxwrapper option reference:
;;   https://github.com/elishacloud/dxwrapper/wiki/Configuration
;; ----------------------------------------------------------------------------

[General]
RealDllPath                = AUTO   ;; auto-locate the real system DLL to wrap
WrapperMode                = AUTO   ;; auto-detect which DLL we're standing in for
LoadCustomDllPath          =
ExcludeProcess             =
IncludeProcess             =
RunProcess                 =
WaitForProcess             = 0
DisableLogging             = 1      ;; 1 = no log file. Set 0 to write dxwrapper-dkii.log
                                    ;; (required by the read-only RE probes near the bottom).

[Plugins]
LoadPlugins                = 0
LoadFromScriptsOnly        = 0

[Compatibility]
;; Dd7to9 is THE foundation: it converts DK2's DirectDraw / Direct3D 1-7 calls to
;; Direct3D 9, which is what RTX Remix hooks. Without it there is no Remix on DK2.
Dd7to9                     = 1
D3d8to9                    = 0
D3d9to9Ex                  = 0
DDrawCompat                = 0
Dinputto8                  = 0
DisableGameUX              = 0
EnableDdrawWrapper         = 0
EnableD3d9Wrapper          = 1      ;; hook the resulting D3D9 so the DK2 layer below can run
EnableDinput8Wrapper       = 0
EnableDsoundWrapper        = 0
EnableOpenDialogHook       = 0
WinVersionLie              = off
WinVersionLieSP            = 0
FixPerfCounterUptime       = 0
HandleExceptions           = 0
SingleProcAffinity         = 1      ;; pin to one core — the 1999 engine is happier single-threaded

[DDrawCompat]
;; Unused for DK2 (DDrawCompat integration off). Standard dxwrapper options.
DDrawCompat20              = 0
DDrawCompat21              = 0
DDrawCompat32              = 0
DDrawCompatDisableGDIHook  = 0
DDrawCompatNoProcAffinity  = 0

[ddraw]
DdrawOverrideBitMode       = 0
DdrawUseDirect3D9Caps      = 0

[Dd7to9]
;; --- Standard Dd7to9 knobs, left at defaults for DK2 ---
DdrawAutoFrameSkip         = 0
DdrawEmulateSurface        = 0
DdrawEmulateLock           = 0
DdrawExtraEmulationSize    = 0
DdrawKeepAllInterfaceCache = 0
DdrawForceMipMapAutoGen    = 0
DdrawClampVertexZDepth     = 0
DdrawFixByteAlignment      = 0
DdrawEnableByteAlignment   = 0
DdrawIntroVideoFix         = 0
DdrawRemoveScanlines       = 0
DdrawRemoveInterlacing     = 0
DdrawReadFromGDI           = 0
DdrawWriteToGDI            = 0
DdrawLimitTextureFormats   = 0
DdrawLimitDisplayModeCount = 0
DdrawCustomWidth           = 0
DdrawCustomHeight          = 0
DdrawUseNativeResolution   = 0
DdrawOverrideWidth         = 0
DdrawOverrideHeight        = 0
DdrawIntegerScalingClamp   = 0
DdrawMaintainAspectRatio   = 1

;; --- RTX Remix geometry compatibility (DK2-specific) -------------------------
;; DK2 submits pre-transformed, screen-space (XYZRHW) vertices. A path tracer needs
;; real 3D, so we reverse that projection back into world space. FOV / planes are
;; tuned for DK2's isometric top-down camera.
DdrawDisableLighting                        = 1   ;; drop DK2's fixed-function lighting; Remix lights the scene
DdrawConvertHomogeneousW                    = 1
DdrawConvertHomogeneousToWorld              = 1
DdrawConvertHomogeneousToWorldUseGameCamera = 0
DdrawConvertHomogeneousToWorldFOV           = 60.0
DdrawConvertHomogeneousToWorldNearPlane     = 0.1
DdrawConvertHomogeneousToWorldFarPlane      = 5000.0

;; --- Predetermined hashing / canonical texture identity (the core of this project)
;; DK2 bin-packs sprites into shared atlas pages at runtime, so a page's Remix hash
;; DRIFTS between runs. These settings recover the page's stable source identity and
;; resolve it to canonical, offline-known art so replacements actually stick.
;; (Replacement art + the _canonical sidecars are not shipped with the wrapper.)
DdrawCanonicalRebind        = 1   ;; rebind drifted whole-surface content onto frozen canonicals
DdrawNameKey                = 2   ;; 0=off  1=shadow(log only)  2=name-key authoritative (needs CanonicalRebind)
DdrawNameKeyCrop            = 2   ;; 0=off  1=shadow  2=serve per-(name,mip) crops (per-frame torch/sparkle/icons)
DdrawUniversalDecompose     = 1   ;; crop any sub-rect draw into its own content-hashed sub-texture
DdrawAtlasDecompose         = 0   ;; superseded by UniversalDecompose
DdrawCollapseAnimationPools = 0

;; --- UI / cursor readability under path tracing ------------------------------
DdrawDynamicUiEmissive      = 0   ;; force pointer/tooltips/minimap self-lit (off here; ember lighting carries the HUD)

;; --- Water: still + translucent ----------------------------------------------
;; DK2's water is a 32-frame animated texture on a per-frame sine-waved mesh.
DdrawWaterCollapse          = 1   ;; collapse all 32 frames to one stable hash (one translucent material covers it)
DdrawWaterFlatten           = 1   ;; flatten the sine-wave geometry (per-frame world-space surface fit)
DdrawWaterCropLarge         = 1   ;; route large water meshes through the same still translucent crop

;; --- CRT heap replacement (performance) --------------------------------------
;; Detour DK2's five VC6 CRT allocators to a private low-fragmentation heap,
;; bypassing the 1999 small-block-heap global lock that serialized alloc/free
;; across the sound and main threads. Verify-gated; falls back safely on mismatch.
;; Look for "[HEAP] INSTALLED: 5/5" in the log. Set 0 for an instant revert.
DdrawReplaceHeap            = 1

;; --- High-resolution front-end menu (DKII.exe runtime patch) -----------------
;; Rewrites launchGame's hardcoded 640x480; the exe's own GUI scaler does the rest.
;; Set width/height to your display (0 = stock 640x480 menu).
DdrawMenuResWidth           = 2560
DdrawMenuResHeight          = 1600
DdrawOrphanOverlayLift      = 1   ;; lift menu cursor/overlays to near-depth so they're visible
DdrawMenuBlitOverlay        = 1   ;; re-emit the menu's 2D backbuffer Blts as draws so the path tracer shows them

;; --- Read-only reverse-engineering probes (diagnostic; all OFF) --------------
;; These never change rendering; they only log. Enable one at a time (and set
;; DisableLogging=0) when investigating.
DdrawContentCapture         = 0   ;; dump every bound texture as PNG (heavy)
DdrawStage3BoundDump        = 0   ;; cheap per-distinct-hash corpus feeder
DdrawRecipeLog              = 0   ;; [RECIPE]/[LOCKW] atlas-composition instrumentation
DdrawOwnerLog               = 0   ;; log the source name index at the upload blit
DdrawLogTextureAtlas        = 0
DdrawGeomProbe              = 0   ;; hash draw topology+UVs to test for stable mesh identity ([GEOMPROBE])
DdrawDrawCallerLog          = 0   ;; stack-scan the game's render call sites in DKII.exe ([DRAWCALLER])

[d3d9]
;; Standard dxwrapper D3D9 options. EnableWindowMode + FullscreenWindowMode give a
;; borderless window, which plays nicest with the Remix overlay.
AnisotropicFiltering       = 0
AntiAliasing               = 0
EnvironmentCubeMapFix      = 0
EnableVSync                = 0
ForceVsyncMode             = 0
ShowFPSCounter             = 0
OverrideRefreshRate        = 0
LimitDisplayModeCount      = 0
CustomDisplayWidth         = 0
CustomDisplayHeight        = 0
LimitPerFrameFPS           = 0
EnableWindowMode           = 1
WindowModeBorder           = 0
SetInitialWindowPosition   = 0
InitialWindowPositionLeft  = 0
InitialWindowPositionTop   = 0
FullscreenWindowMode       = 1
ForceExclusiveFullscreen   = 0
ForceMixedVertexProcessing = 0
ForceSystemMemVertexCache  = 0
SetSwapEffectShim          = 0
DisableMaxWindowedMode     = 0
ForceDirect3D9On12         = 0
GraphicsHybridAdapter      = 0

[FullScreen]
FullScreen                 = 0
ForceWindowResize          = 0
WaitForWindowChanges       = 0

[dinput8]
DeviceLookupCacheTime      = 0
FilterNonActiveInput       = 0
FixHighFrequencyMouse      = 0
MouseMovementFactor        = 0
MouseMovementPadding       = 0

[dsound]
Num2DBuffers               = 0
Num3DBuffers               = 0
ForceCertification         = 0
ForceExclusiveMode         = 0
ForceSoftwareMixing        = 0
ForceHardwareMixing        = 0
ForceHQ3DSoftMixing        = 0
ForceNonStaticBuffers      = 0
ForceVoiceManagement       = 0
ForcePrimaryBufferFormat   = 0
PrimaryBufferBits          = 16
PrimaryBufferSamples       = 44100
PrimaryBufferChannels      = 2
AudioClipDetection         = 0
